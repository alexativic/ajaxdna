<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AjaxDNA — Redirecting...</title>

  <!-- ============================================================
       REDIRECT CONFIG — Change ONLY this URL to retarget the QR code.
       No need to reprint anything. Just edit, commit, push.
       ============================================================ -->
  <meta http-equiv="refresh" content="2; URL='https://docs.google.com/forms/d/e/1FAIpQLSfQlyWkMtnBQ_5bqkNDqm9bBKe_TWQtZZ2-dxZXn6Z0eNPSIQ/viewform?usp=publish-editor'" />

  <script>
    // ─── Editable redirect target (must match the meta tag above) ───
    const REDIRECT_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfQlyWkMtnBQ_5bqkNDqm9bBKe_TWQtZZ2-dxZXn6Z0eNPSIQ/viewform?usp=publish-editor";

    // Redirect via JS (faster than meta refresh)
    setTimeout(function () {
      window.location.replace(REDIRECT_URL);
    }, 1800);
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0e1a;
      color: #e2e8f0;
      overflow: hidden;
    }

    /* Animated gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(56, 189, 248, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(16, 185, 129, 0.08) 0%, transparent 50%);
      animation: pulseGlow 6s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes pulseGlow {
      0%   { opacity: 0.6; transform: scale(1); }
      100% { opacity: 1;   transform: scale(1.05); }
    }

    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2.5rem;
      border-radius: 1.25rem;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(148, 163, 184, 0.1);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
      max-width: 420px;
      width: 90%;
    }

    .logo-text {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #38bdf8, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 1.25rem;
      border: 3px solid rgba(148, 163, 184, 0.15);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .message {
      font-size: 0.95rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .fallback-link {
      display: inline-block;
      font-size: 0.85rem;
      color: #38bdf8;
      text-decoration: none;
      padding: 0.5rem 1.25rem;
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 0.5rem;
      transition: all 0.2s ease;
    }

    .fallback-link:hover {
      background: rgba(56, 189, 248, 0.1);
      border-color: #38bdf8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-text">AjaxDNA</div>
    <div class="spinner"></div>
    <p class="message">Redirecting you to our enrollment portal&hellip;</p>
    <a class="fallback-link" id="manual-link" href="https://tally.so/r/REPLACE_WITH_YOUR_CODE">
      Tap here if not redirected
    </a>
  </div>

  <script>
    // Keep fallback link in sync
    document.getElementById('manual-link').href = REDIRECT_URL;
  </script>
</body>
</html>
